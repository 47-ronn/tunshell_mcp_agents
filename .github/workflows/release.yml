name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # ---------------------------------------------------------------------------
  # Build the unified MCP server/agent (`remote-agent`) and the self-hosted
  # relay (`remote-agents-relay`) binaries for each platform.
  # ---------------------------------------------------------------------------
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-latest,   target: x86_64-apple-darwin }
          - { os: macos-latest,   target: aarch64-apple-darwin }
          # Static musl build → no glibc dependency, runs on any Linux distro.
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-musl }
          # Native glibc build → dynamically linked; preferred on standard
          # distros (e.g. the relay under load, where the glibc allocator helps).
          - { os: ubuntu-latest,  target: x86_64-unknown-linux-gnu }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Install musl tools
        if: contains(matrix.target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build binaries
        run: cargo build --release --target ${{ matrix.target }} -p remote-agent -p remote-agents-relay

      - name: Package (unix)
        if: runner.os != 'Windows'
        run: |
          dist="remote-agents-${{ matrix.target }}"
          mkdir -p "$dist"
          cp "target/${{ matrix.target }}/release/remote-agent" "$dist/"
          cp "target/${{ matrix.target }}/release/remote-agents-relay" "$dist/"
          tar -czf "$dist.tar.gz" "$dist"
          # Raw single binary for the npm installer (downloaded at `npm install`).
          cp "target/${{ matrix.target }}/release/remote-agent" "remote-agent-${{ matrix.target }}"

      - name: Package (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $dist = "remote-agents-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path $dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/remote-agent.exe" $dist
          Copy-Item "target/${{ matrix.target }}/release/remote-agents-relay.exe" $dist
          Compress-Archive -Path $dist -DestinationPath "$dist.zip"
          Copy-Item "target/${{ matrix.target }}/release/remote-agent.exe" "remote-agent-${{ matrix.target }}.exe"

      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.target }}
          path: |
            remote-agents-*.tar.gz
            remote-agents-*.zip
            remote-agent-${{ matrix.target }}*

  # ---------------------------------------------------------------------------
  # Attach all platform archives to the GitHub release.
  # ---------------------------------------------------------------------------
  release:
    name: release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Attach binaries to release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true

  # ---------------------------------------------------------------------------
  # Publish the npm wrapper (downloads the matching release binary on install).
  # Requires the NPM_TOKEN repository secret.
  # ---------------------------------------------------------------------------
  npm-publish:
    name: npm publish
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - name: Set version from tag
        working-directory: npm
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version
      - name: Publish to npm
        working-directory: npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
