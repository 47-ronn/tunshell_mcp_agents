name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust (test + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # The whole workspace (mcp-server enables the shared `udp` feature, so the
      # UDP channel tests run here too).
      - name: cargo test
        run: cargo test --workspace
      - name: cargo clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

  worker:
    name: Worker + npm package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - name: tsc --noEmit (worker)
        run: npx tsc --noEmit -p worker
      - name: npm package — syntax check
        run: node --check npm/install.js && node --check npm/run.js
      - name: npm package — unit tests
        run: node --test npm/install.test.js
