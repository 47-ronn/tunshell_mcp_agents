[package]
name = "remote-agents-shared"
version.workspace = true
edition.workspace = true
license.workspace = true

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
uuid = { workspace = true }

# Optional end-to-end encryption (AES-GCM-256)
aes-gcm = "0.10"
sha2 = "0.10"
rand = "0.8"
base64 = "0.22"

# UDP P2P transport (optional feature)
tokio = { workspace = true, optional = true }
ruzstd = "0.8.3"
if-addrs = "0.15"
socket2 = "0.5"
postcard = { version = "1", features = ["use-std"] }

# Protobuf wire types, generated from proto/remote_agents.proto at build time.
prost = "0.13"

[build-dependencies]
# Pure-Rust .proto compiler (no system `protoc` needed — works in CI and the
# `cross` musl container) feeding prost's code generator.
protox = "0.7"
prost-build = "0.13"

[features]
default = []
udp = ["tokio"]

[target.'cfg(target_os = "linux")'.dependencies]
libc = "0.2"
