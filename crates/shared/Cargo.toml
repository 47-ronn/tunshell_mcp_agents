[package]
name = "remote-agents-shared"
version.workspace = true
edition.workspace = true
license.workspace = true

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
uuid = { workspace = true }

# Optional end-to-end encryption (AES-GCM-256)
aes-gcm = "0.10"
sha2 = "0.10"
rand = "0.8"
base64 = "0.22"

# UDP P2P transport (optional feature)
tokio = { workspace = true, optional = true }
ruzstd = "0.8.3"
if-addrs = "0.15"
socket2 = "0.5"
postcard = { version = "1", features = ["use-std"] }

# QUIC data transport over the hole-punched socket (optional, `udp` feature).
# quinn brings mature congestion control + GSO/GRO batched syscalls — far past
# our hand-rolled per-packet-ACK ARQ. rcgen mints a self-signed cert; the peer
# is already authenticated by the hole-punch nonce + our E2E cipher, so QUIC's
# TLS uses an accept-any verifier.
quinn = { version = "0.11", optional = true }
rustls = { version = "0.23", default-features = false, features = ["ring", "std"], optional = true }
rcgen = { version = "0.13", optional = true }

# Protobuf wire types, generated from proto/remote_agents.proto at build time.
prost = "0.13"

[build-dependencies]
# Pure-Rust .proto compiler (no system `protoc` needed — works in CI and the
# `cross` musl container) feeding prost's code generator.
protox = "0.7"
prost-build = "0.13"

[features]
default = []
udp = ["tokio", "quinn", "rustls", "rcgen"]

[target.'cfg(target_os = "linux")'.dependencies]
libc = "0.2"
